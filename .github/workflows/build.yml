name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main # Trigger this on pull requests to the main branch

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Set up Terraform
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: '1.0.11'  # Specify your desired Terraform version

    # Cache Terraform providers and modules
    - name: Cache Terraform modules
      uses: actions/cache@v2
      with:
        path: |
          ~/.terraform.d
          .terraform
        key: ${{ runner.os }}-terraform-${{ hashFiles('**/*.tf') }}
        
    # Configure AWS credentials (this is if you are using AWS)
    - name: Set up AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # Initialize Terraform
    - name: Terraform Init
      run: terraform init

    # Terraform plan to see what changes are pending
    - name: Terraform Plan
      run: terraform plan

    # Apply the Terraform plan (ensure to confirm apply if it's in production)
    - name: Terraform Apply
      run: terraform apply --auto-approve

    - name: Terraform Destroy
      run: terraform destroy --auto-approve
